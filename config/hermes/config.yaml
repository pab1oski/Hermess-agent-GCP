agent:
  name: "${AGENT_NAME}"
  soul_file: ~/.hermes/SOUL.md

model:
  provider: litellm-proxy
  model: gemini-2.5-pro

custom_providers:
  - name: litellm-proxy
    base_url: http://localhost:4000/v1
    api_key: "${OPENAI_API_KEY}"
    model: gemini-2.5-pro
    context_length: 131072

platforms:
  webhook:
    enabled: true
    extra:
      host: "0.0.0.0"
      port: 8644
      secret: "${WEBHOOK_SECRET}"

toolsets:
  - terminal
  - file
  - code_execution
